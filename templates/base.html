<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}CALCULO AI{% endblock %}</title>
        <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="icon" href="{{ url_for('static', filename='images/img.png') }}">

        <!-- MathJax config MUST come before the MathJax script -->
        <script>
            MathJax = {
                tex: {
                    inlineMath: [['\\(', '\\)'], ['$', '$']],
                    displayMath: [['\\[', '\\]'], ['$$', '$$']],
                    processEscapes: true
                },
                options: {
                    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
                }
            };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    </head>
    <body>
        <nav class="navbar-main">
            <div class="inner">
                <a href="{{url_for('index')}}" class="logo">
                    <img src="{{url_for('static', filename='images/img.png')}}" alt="logo">
                    <span class="name">CALCULO AI</span>
                </a>
                <ul class="nav-links">
                    <li class="nav-link"><a href="{{url_for('index')}}">Home</a></li>
                    <li class="nav-link"><a href="{{url_for('solver')}}">Solver</a></li>
                    <li class="nav-link"><a href="{{url_for('graphs')}}">Graphs</a></li>
                    <li class="nav-link"><a href="{{url_for('formulas')}}">Formulas</a></li>
                    <li class="nav-link"><a href="{{url_for('quiz')}}">Quiz</a></li>
                </ul>
            </div>
        </nav>

        {% block content %}{% endblock %}

        <footer class="footer">
            <div class="inner">
                <p>&copy; 2026 Eugene Yarney</p>
                <p>Powered by Groq 🔥</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        {% block scripts %}
        <script src="{{url_for('static', filename='js/main.js')}}"></script>
        {% endblock %}
    </body>
</html>
